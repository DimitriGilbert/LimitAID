<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LimitAID - AI Provider Quota Monitor</title>
  <desc id="desc">Monitor Codex, OpenRouter, and Z.ai quotas from one terminal command.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07130f" />
      <stop offset="0.55" stop-color="#0f172a" />
      <stop offset="1" stop-color="#240b10" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" />
      <stop offset="1" stop-color="#ef4444" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1000" cy="120" r="220" fill="#22c55e" opacity="0.12" />
  <circle cx="170" cy="520" r="260" fill="#ef4444" opacity="0.12" />
  <rect x="88" y="86" width="1024" height="458" rx="34" fill="#0b1220" opacity="0.86" stroke="#263244" />
  <rect x="128" y="130" width="68" height="68" rx="16" fill="#22c55e" />
  <text x="162" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">L</text>
  <text x="224" y="157" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#86efac" letter-spacing="4">LimitAID</text>
  <text x="128" y="282" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800" fill="#f8fafc">Know your limits.</text>
  <text x="128" y="345" font-family="Inter, Arial, sans-serif" font-size="31" fill="#cbd5e1">Check AI quotas, balances, and usage</text>
  <text x="128" y="386" font-family="Inter, Arial, sans-serif" font-size="31" fill="#cbd5e1">across Codex, OpenRouter, and Z.ai.</text>
  <rect x="128" y="450" width="770" height="24" rx="12" fill="#1e293b" />
  <rect x="128" y="450" width="540" height="24" rx="12" fill="url(#bar)" />
  <text x="128" y="515" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" fill="#e2e8f0">$ limitaid all</text>
</svg>
